[character]
success_symbol = "[❯](bold green)"
error_symbol = "[❯](bold red)"

[directory]
truncation_length = 0
truncation_symbol = "../"
style = "bold cyan"
#fish_style_pwd_dir_length = 0
#truncate_to_repo = false

[git_branch]
symbol = " "
truncation_length = 20
truncation_symbol = "…"
style = "bold purple"

[git_status]
conflicted = "⚡"
ahead = "⇡${count}"
behind = "⇣${count}"
diverged = "⇕⇡${ahead_count}⇣${behind_count}"
untracked = "?"
stashed = "📦"
modified = "!"
staged = "+"
renamed = "»"
deleted = "✘"
style = "bold red"

[dotnet]
symbol = " "
style = "bold blue"
heuristic = true

[azure]
disabled = false
format = 'on [$symbol($subscription)]($style) '
symbol = " "
style = "bold blue"

[battery]
disabled = true

[cmd_duration]
min_time = 2_000
format = "took [$duration](bold yellow)"

[line_break]
disabled = false
